name: Deploy site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out site repo
        uses: actions/checkout@v4

      - name: Check out assets repo
        uses: actions/checkout@v4
        with:
          repository: alexmacflai/openbars-assets
          path: openbars-assets

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build site
        env:
          OPENBARS_ASSETS_DIR: ${{ github.workspace }}/openbars-assets
          OPENBARS_ASSETS_BASE_URL: https://alexmacflai.github.io/openbars-assets/
          OPENBARS_SITE_URL: https://alexmacflai.github.io
          OPENBARS_BASE_PATH: /openbars/
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
